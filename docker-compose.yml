name: metahive

x-java-env: &java-env
  DB_URL: jdbc:mysql://mysql:3306/metahive?allowPublicKeyRetrieval=true&useSSL=false
  DB_USERNAME: metahive_user
  DB_PASSWORD: metahive_password
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/metahive?allowPublicKeyRetrieval=true&useSSL=false
  SPRING_DATASOURCE_USERNAME: metahive_user
  SPRING_DATASOURCE_PASSWORD: metahive_password
  SPRING_FLYWAY_ENABLED: "false"
  OTEL_TRACES_EXPORTER: none
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: none

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: metahive
      MYSQL_USER: metahive_user
      MYSQL_PASSWORD: metahive_password
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_HOST_BIND:-0.0.0.0}:${MYSQL_HOST_PORT:-3070}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - metahive

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - metahive

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - metahive

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/metahive?allowPublicKeyRetrieval=true&useSSL=false
      KC_DB_USERNAME: metahive_user
      KC_DB_PASSWORD: metahive_password
      KC_HTTP_PORT: 8181
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost:8181}
      KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-false}
      KC_PROXY_HEADERS: ${KEYCLOAK_PROXY_HEADERS:-xforwarded}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "${KEYCLOAK_HOST_BIND:-0.0.0.0}:${KEYCLOAK_HOST_PORT:-8181}:8181"
    volumes:
      - ./infra/keycloak/realms:/opt/keycloak/data/import
      - ./infra/keycloak/themes:/opt/keycloak/themes
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - metahive

  api-gateway:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
      target: api-gateway
    environment:
      SERVER_PORT: 9000
      OFFICE_SERVICE_URL: http://office-service:8080
      USER_SERVICE_URL: http://user-service:8082
      DOCUMENT_SERVICE_URL: http://doc-service:8083
      PROJECT_MANAGER_URL: http://project-manager:9087
      ACTIVITY_TRACKER_URL: http://activity-tracker:8085
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:8181/realms/meta}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8181/realms/meta/protocol/openid-connect/certs
      OTEL_TRACES_EXPORTER: none
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    ports:
      - "${API_GATEWAY_HOST_BIND:-0.0.0.0}:${API_GATEWAY_HOST_PORT:-9000}:9000"
    depends_on:
      keycloak:
        condition: service_started
      office-service:
        condition: service_started
      user-service:
        condition: service_started
      doc-service:
        condition: service_started
      project-manager:
        condition: service_started
    networks:
      - metahive

  office-service:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
      target: office-service
    environment:
      <<: *java-env
      JWT_ISSUER_URL: ${KEYCLOAK_ISSUER_URI:-http://localhost:8181/realms/meta}
      JWT_SECRET: ${JWT_SECRET:-dev-local-secret}
      PROJECT_FILE_PATH: /data/files
      PROJECT_IMAGE: /data/images
    ports:
      - "${OFFICE_SERVICE_HOST_BIND:-0.0.0.0}:${OFFICE_SERVICE_HOST_PORT:-8080}:8080"
    volumes:
      - office_files:/data/files
      - office_images:/data/images
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - metahive

  user-service:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
      target: user-service
    environment:
      <<: *java-env
      SPRING_PROFILES_ACTIVE: default
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8181
      KEYCLOAK_REALM: meta
      KEYCLOAK_RESOURCE: user-service
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:8181/realms/meta}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8181/realms/meta/protocol/openid-connect/certs
    ports:
      - "${USER_SERVICE_HOST_BIND:-0.0.0.0}:${USER_SERVICE_HOST_PORT:-8082}:8082"
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - metahive

  doc-service:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
      target: doc-service
    environment:
      <<: *java-env
      PROJECT_FILE_PATH: /data/files
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "${DOC_SERVICE_HOST_BIND:-0.0.0.0}:${DOC_SERVICE_HOST_PORT:-8083}:8083"
    volumes:
      - doc_files:/data/files
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - metahive

  project-manager:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
      target: project-manager
    environment:
      <<: *java-env
      SPRING_PROFILES_ACTIVE: default
    ports:
      - "${PROJECT_MANAGER_HOST_BIND:-0.0.0.0}:${PROJECT_MANAGER_HOST_PORT:-9087}:9087"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - metahive

  map-service:
    build:
      context: ./services/backend/multiplayer-map-service
    environment:
      SERVER_PORT: 9502
      APP_CORS_ALLOWED_ORIGINS: ${MAP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "${MAP_SERVICE_HOST_BIND:-0.0.0.0}:${MAP_SERVICE_HOST_PORT:-9502}:9502"
    networks:
      - metahive

  rag-service:
    build:
      context: ./services/rag-service
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RAG_DATA_DIR: /app/data
      RAG_UPLOAD_DIR: /app/uploads
      FLASK_HOST: 0.0.0.0
      PORT: 5000
    ports:
      - "${RAG_SERVICE_HOST_BIND:-0.0.0.0}:${RAG_SERVICE_HOST_PORT:-5001}:5000"
    volumes:
      - rag_data:/app/data
      - rag_uploads:/app/uploads
    networks:
      - metahive

  discord-bot:
    build:
      context: ./apps/discord-bot
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/metahive-discord
      NEXTJS_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:-http://localhost:3000}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
    ports:
      - "${DISCORD_BOT_HOST_BIND:-0.0.0.0}:${DISCORD_BOT_HOST_PORT:-4000}:4000"
    depends_on:
      mongo:
        condition: service_started
    networks:
      - metahive

  frontend:
    build:
      context: ./apps/frontend
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:9000}
      NEXT_PUBLIC_KEYCLOAK_URL: ${PUBLIC_KEYCLOAK_URL:-http://localhost:8181}
      NEXT_PUBLIC_KEYCLOAK_REALM: meta
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: metahive
      NEXT_PUBLIC_MAP_WS_URL: ${PUBLIC_MAP_WS_URL:-http://localhost:9502/ws}
      NEXT_PUBLIC_BACKEND_URL: ${PUBLIC_DISCORD_BACKEND_URL:-http://localhost:4000}
      NEXT_PUBLIC_RAG_BASE_URL: ${PUBLIC_RAG_BASE_URL:-http://localhost:5001}
    ports:
      - "${FRONTEND_HOST_BIND:-0.0.0.0}:${FRONTEND_HOST_PORT:-3000}:3000"
    depends_on:
      api-gateway:
        condition: service_started
      keycloak:
        condition: service_started
      map-service:
        condition: service_started
      rag-service:
        condition: service_started
      discord-bot:
        condition: service_started
    networks:
      - metahive

networks:
  metahive:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  mongo_data:
  office_files:
  office_images:
  doc_files:
  rag_data:
  rag_uploads:
